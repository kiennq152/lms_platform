# Kustomize configuration for easier management
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lms

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres-deployment.yaml
  - app-deployment.yaml
  - ingress.yaml
  - hpa.yaml

commonLabels:
  app: stitch-lms
  managed-by: kustomize

# Uncomment to use images from a registry
# images:
# - name: stitch-lms
#   newName: your-registry.com/stitch-lms
#   newTag: 1.0.0

