apiVersion: v1
kind: Secret
metadata:
  name: lms-secrets
  namespace: lms
  labels:
    app: stitch-lms
type: Opaque
stringData:
  # Base64 encoded values (Kubernetes will encode them automatically)
  # Replace these with your actual values
  DB_USER: "postgres"
  DB_PASSWORD: "your-secure-password-here"
  # Add JWT secrets and other sensitive data here
  # JWT_SECRET: "your-jwt-secret-here"

---
# Example: To create secrets from command line instead:
# kubectl create secret generic lms-secrets \
#   --from-literal=DB_USER=postgres \
#   --from-literal=DB_PASSWORD=your-password \
#   --namespace=lms

