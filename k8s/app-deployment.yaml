apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms-app
  namespace: lms
  labels:
    app: stitch-lms
    component: backend
spec:
  replicas: 3  # Adjust based on your needs
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: stitch-lms
      component: backend
  template:
    metadata:
      labels:
        app: stitch-lms
        component: backend
    spec:
      containers:
      - name: lms-app
        image: stitch-lms:latest  # Replace with your image registry
        # image: your-registry.com/stitch-lms:1.0.0  # Example with registry
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5173
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: lms-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: lms-config
              key: PORT
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: lms-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: lms-config
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: lms-config
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: lms-secrets
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: lms-secrets
              key: DB_PASSWORD
        - name: CORS_ORIGIN
          valueFrom:
            configMapKeyRef:
              name: lms-config
              key: CORS_ORIGIN
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5173
          initialDelaySeconds: 40
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5173
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        # Security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL

---
apiVersion: v1
kind: Service
metadata:
  name: lms-service
  namespace: lms
  labels:
    app: stitch-lms
spec:
  type: LoadBalancer  # Use ClusterIP if you have Ingress, NodePort for testing
  # type: ClusterIP  # For use with Ingress
  ports:
  - port: 80
    targetPort: 5173
    protocol: TCP
    name: http
  selector:
    app: stitch-lms
    component: backend
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

