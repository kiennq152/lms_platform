<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>VIAN Academy - Cộng Đồng</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1E3A8A",
                        "accent": "#DC2626",
                        "background-light": "#F8F9FA",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                },
            },
        }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-gray-900 dark:text-gray-100">
<div class="flex flex-col min-h-screen">
    <!-- Header -->
    <header class="sticky top-0 z-20 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-6 lg:px-8 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <h1 class="text-2xl font-bold">VIAN Community</h1>
            <div class="flex items-center gap-4">
                <button class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90">
                    <span class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-lg">add</span>
                        Tạo Chủ Đề Mới
                    </span>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 p-6 lg:p-8">
        <div class="max-w-5xl mx-auto">
            <!-- Navigation Tabs -->
            <div class="flex gap-4 mb-8 border-b border-gray-200 dark:border-gray-700">
                <button class="px-4 py-3 font-semibold border-b-2 border-primary text-primary">Diễn Đàn</button>
                <button class="px-4 py-3 font-semibold border-b-2 border-transparent text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200">Hỏi Đáp</button>
                <button class="px-4 py-3 font-semibold border-b-2 border-transparent text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200">Tin Tức</button>
            </div>

            <!-- Search and Filters -->
            <div class="flex gap-4 mb-8">
                <div class="flex-1 relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2">search</span>
                    <input type="text" placeholder="Tìm chủ đề..." class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800"/>
                </div>
                <select class="px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
                    <option>Mới Nhất</option>
                    <option>Phổ Biến Nhất</option>
                    <option>Được Trả Lời Nhiều Nhất</option>
                </select>
            </div>

            <!-- Threads List -->
            <div class="space-y-4" id="threadsList">
                <!-- Loaded by JavaScript -->
            </div>

            <!-- Load More Button -->
            <div class="flex justify-center mt-8">
                <button class="px-6 py-2 border border-primary text-primary rounded-lg hover:bg-primary/10">Xem Thêm</button>
            </div>
        </div>
    </main>
</div>

<!-- New Thread Modal -->
<div id="newThreadModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg max-w-2xl w-full">
        <div class="flex items-center justify-between p-6 border-b border-gray-200 dark:border-gray-700">
            <h2 class="text-xl font-bold">Tạo Chủ Đề Mới</h2>
            <button onclick="document.getElementById('newThreadModal').classList.add('hidden')" class="text-gray-500 hover:text-gray-700">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <form class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-2">Tiêu Đề</label>
                <input type="text" placeholder="Nhập tiêu đề chủ đề..." class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-primary"/>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Nội Dung</label>
                <textarea placeholder="Viết nội dung chủ đề..." rows="6" class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-primary"></textarea>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Danh Mục</label>
                <select class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-primary">
                    <option>Hỗ Trợ Chung</option>
                    <option>Thảo Luận Khóa Học</option>
                    <option>Dự Án & Hợp Tác</option>
                    <option>Giới Thiệu & Truyền Thông</option>
                </select>
            </div>
            <div class="flex gap-4 justify-end">
                <button type="button" onclick="document.getElementById('newThreadModal').classList.add('hidden')" class="px-4 py-2 border border-gray-200 dark:border-gray-700 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">Hủy</button>
                <button type="submit" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90">Đăng</button>
            </div>
        </form>
    </div>
</div>

<script src="../../js/api.js"></script>
<script>
class Community {
    constructor() {
        this.api = null;
        this.topics = [];
        this.currentFilter = 'all';
        this.currentSort = 'newest';
        this.searchQuery = '';
        this.init();
    }

    async init() {
        await this.waitForAPI();
        await this.loadTopics();
        this.setupEventListeners();
    }

    async waitForAPI() {
        return new Promise((resolve) => {
            if (window.api) {
                this.api = window.api;
                resolve();
            } else {
                let attempts = 0;
                const maxAttempts = 20;
                const checkInterval = setInterval(() => {
                    attempts++;
                    if (window.api) {
                        this.api = window.api;
                        clearInterval(checkInterval);
                        resolve();
                    } else if (attempts >= maxAttempts) {
                        clearInterval(checkInterval);
                        resolve();
                    }
                }, 200);
            }
        });
    }

    async loadTopics() {
        try {
            if (!this.api) {
                throw new Error('API not available');
            }

            const params = {
                sort: this.currentSort
            };

            if (this.currentFilter === 'unanswered') {
                params.filter = 'unanswered';
            } else if (this.currentFilter === 'solved') {
                params.filter = 'solved';
            } else if (this.currentFilter === 'my_posts') {
                const response = await this.api.getMyPosts({ sort: this.currentSort });
                this.topics = response.topics || [];
                this.renderThreads();
                return;
            }

            if (this.searchQuery) {
                params.search = this.searchQuery;
            }

            const response = await this.api.getForumTopics(params);
            this.topics = response.topics || [];
            this.renderThreads();
        } catch (error) {
            console.error('Error loading topics:', error);
            document.getElementById('threadsList').innerHTML = `
                <div class="text-center py-12">
                    <span class="material-symbols-outlined text-6xl text-gray-400 mb-4">error</span>
                    <p class="text-gray-600 dark:text-gray-400">Không thể tải chủ đề. Vui lòng thử lại.</p>
                </div>
            `;
        }
    }

    setupEventListeners() {
        // New thread button
        const newThreadBtn = Array.from(document.querySelectorAll('button')).find(btn => 
            btn.textContent.includes('Tạo Chủ Đề Mới')
        );
        if (newThreadBtn) {
            newThreadBtn.addEventListener('click', () => {
                document.getElementById('newThreadModal').classList.remove('hidden');
            });
        }

        // Modal form
        const modalForm = document.querySelector('#newThreadModal form');
        if (modalForm) {
            modalForm.addEventListener('submit', (e) => {
                e.preventDefault();
                this.createTopic(e.target);
            });
        }

        // Search input
        const searchInput = document.querySelector('input[placeholder*="Tìm"]');
        if (searchInput) {
            let searchTimeout;
            searchInput.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    this.searchQuery = e.target.value.trim();
                    this.loadTopics();
                }, 500);
            });
        }

        // Sort select
        const sortSelect = document.querySelector('select');
        if (sortSelect) {
            sortSelect.addEventListener('change', (e) => {
                this.currentSort = e.target.value === 'Mới Nhất' ? 'newest' : 
                                  e.target.value === 'Phổ Biến Nhất' ? 'popular' : 'most_replied';
                this.loadTopics();
            });
        }

        // Tab buttons
        const tabs = document.querySelectorAll('button[class*="px-4"][class*="py-3"]');
        tabs.forEach((tab, index) => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => {
                    t.classList.remove('border-primary', 'text-primary');
                    t.classList.add('border-transparent', 'text-gray-600', 'dark:text-gray-400');
                });
                tab.classList.add('border-primary', 'text-primary');
                tab.classList.remove('border-transparent', 'text-gray-600', 'dark:text-gray-400');
                
                // Handle tab switching
                if (index === 0) {
                    this.currentFilter = 'all';
                } else if (index === 1) {
                    this.currentFilter = 'unanswered';
                } else {
                    this.currentFilter = 'all';
                }
                this.loadTopics();
            });
        });
    }

    async createTopic(form) {
        try {
            if (!this.api) {
                throw new Error('API not available');
            }

            const title = form.querySelector('input[type="text"]').value.trim();
            const content = form.querySelector('textarea').value.trim();
            const category = form.querySelector('select').value;

            if (!title || !content) {
                alert('Vui lòng điền đầy đủ thông tin');
                return;
            }

            const topicData = {
                title,
                content,
                course_id: null // Can be linked to course later
            };

            await this.api.createTopic(topicData);
            
            alert('✓ Chủ đề mới đã được tạo thành công!');
            document.getElementById('newThreadModal').classList.add('hidden');
            form.reset();
            await this.loadTopics();
        } catch (error) {
            console.error('Error creating topic:', error);
            alert('Không thể tạo chủ đề. Vui lòng thử lại.');
        }
    }

    formatTime(dateString) {
        const date = new Date(dateString);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);

        if (diffMins < 1) return 'Vừa xong';
        if (diffMins < 60) return `${diffMins} phút trước`;
        if (diffHours < 24) return `${diffHours} giờ trước`;
        if (diffDays < 7) return `${diffDays} ngày trước`;
        return date.toLocaleDateString('vi-VN');
    }

    renderThreads() {
        const list = document.getElementById('threadsList');
        
        if (this.topics.length === 0) {
            list.innerHTML = `
                <div class="text-center py-12">
                    <span class="material-symbols-outlined text-6xl text-gray-400 mb-4">forum</span>
                    <p class="text-gray-600 dark:text-gray-400">Chưa có chủ đề nào.</p>
                </div>
            `;
            return;
        }

        list.innerHTML = this.topics.map(topic => {
            const avatar = topic.author_avatar || 'https://via.placeholder.com/48?text=' + (topic.author_name?.charAt(0) || 'U');
            const timeAgo = this.formatTime(topic.created_at);
            const hasSolution = topic.has_solution;
            
            return `
                <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 p-6 hover:shadow-md transition-shadow cursor-pointer" onclick="window.location.href='_thảo_luận_/_q&a/code.html?id=${topic.topic_id}'">
                    <div class="flex gap-4">
                        <div class="w-12 h-12 rounded-full bg-cover flex-shrink-0 bg-gray-200 dark:bg-gray-700" style="background-image: url('${avatar}')"></div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-start justify-between gap-4">
                                <div class="flex-1">
                                    ${topic.is_pinned ? '<span class="inline-flex items-center gap-1 px-2 py-1 bg-primary/10 text-primary text-xs font-bold rounded mb-2"><span class="material-symbols-outlined text-xs">push_pin</span>Đã ghim</span>' : ''}
                                    <h3 class="font-bold text-lg hover:text-primary transition-colors">${topic.title}</h3>
                                    <div class="flex gap-3 text-sm text-gray-600 dark:text-gray-400 mt-2 flex-wrap">
                                        <span>${topic.author_name || 'Người dùng'}</span>
                                        <span>•</span>
                                        <span>${timeAgo}</span>
                                        ${topic.course_title ? `<span>•</span><span class="inline-flex items-center gap-1"><span class="material-symbols-outlined text-xs">book</span>${topic.course_title}</span>` : ''}
                                    </div>
                                </div>
                                <div class="flex flex-col items-end gap-2">
                                    ${hasSolution ? '<span class="inline-flex items-center gap-1 px-2 py-1 bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-300 text-xs font-bold rounded-full"><span class="material-symbols-outlined text-xs">check_circle</span>Đã giải quyết</span>' : ''}
                                    <span class="inline-flex items-center gap-1 px-3 py-1 bg-gray-100 dark:bg-gray-700 rounded-full text-xs font-semibold flex-shrink-0">
                                        <span class="material-symbols-outlined text-xs">chat</span>
                                        ${topic.reply_count || 0}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-4 mt-4 text-sm text-gray-600 dark:text-gray-400 ml-16">
                        <span class="flex items-center gap-1">
                            <span class="material-symbols-outlined text-xs">visibility</span>
                            ${topic.view_count || 0} lượt xem
                        </span>
                    </div>
                </div>
            `;
        }).join('');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    new Community();
});
</script>
</body>
</html>
