<!DOCTYPE html>
<html class="light" lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Chi Tiết Thảo Luận - VIAN Academy</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#1E3A8A",
          "accent": "#DC2626",
          "background-light": "#F8F9FA",
          "background-dark": "#101922",
        },
        fontFamily: {
          "display": ["Lexend", "sans-serif"]
        },
      },
    },
  }
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .material-symbols-outlined.fill {
    font-variation-settings: 'FILL' 1;
  }
</style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-gray-900 dark:text-gray-100">
<div class="flex flex-col min-h-screen">
<header class="sticky top-0 z-20 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-6 lg:px-8 py-4">
<div class="max-w-7xl mx-auto flex items-center justify-between">
<a href="../index.html" class="flex items-center gap-2 text-gray-600 dark:text-gray-400 hover:text-primary">
<span class="material-symbols-outlined">arrow_back</span>
<span>Quay lại</span>
</a>
<h1 class="text-xl font-bold">Chi Tiết Thảo Luận</h1>
<div></div>
</div>
</header>

<main class="flex-1 p-6 lg:p-8">
<div class="max-w-5xl mx-auto">
<!-- Topic Content -->
<div id="topicContent" class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 p-6 mb-6">
<div class="flex items-center justify-center py-12">
<span class="text-gray-500">Đang tải...</span>
</div>
</div>

<!-- Replies Section -->
<div class="mb-6">
<h2 class="text-xl font-bold mb-4">Trả Lời (<span id="replyCount">0</span>)</h2>
<div id="repliesList" class="space-y-4">
<div class="flex items-center justify-center py-8">
<span class="text-gray-500">Đang tải...</span>
</div>
</div>
</div>

<!-- Reply Form -->
<div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 p-6">
<h3 class="text-lg font-bold mb-4">Viết Trả Lời</h3>
<form id="replyForm" class="space-y-4">
<textarea id="replyContent" rows="6" placeholder="Viết trả lời của bạn..." class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-primary focus:outline-none" required></textarea>
<div class="flex justify-end gap-4">
<button type="button" onclick="window.location.href='../index.html'" class="px-4 py-2 border border-gray-200 dark:border-gray-700 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">Hủy</button>
<button type="submit" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90">Đăng Trả Lời</button>
</div>
</form>
</div>
</div>
</main>
</div>

<script src="../../../js/api.js"></script>
<script>
class TopicDetail {
  constructor() {
    this.api = null;
    this.topicId = null;
    this.topic = null;
    this.replies = [];
    this.init();
  }

  async init() {
    await this.waitForAPI();
    
    // Get topic ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    this.topicId = urlParams.get('id');
    
    if (!this.topicId) {
      document.getElementById('topicContent').innerHTML = `
        <div class="text-center py-12">
          <span class="material-symbols-outlined text-6xl text-red-500 mb-4">error</span>
          <p class="text-gray-600 dark:text-gray-400">Không tìm thấy chủ đề.</p>
          <a href="../index.html" class="mt-4 inline-block text-primary hover:underline">Quay lại diễn đàn</a>
        </div>
      `;
      return;
    }

    await this.loadTopic();
    this.setupEventListeners();
  }

  async waitForAPI() {
    return new Promise((resolve) => {
      if (window.api) {
        this.api = window.api;
        resolve();
      } else {
        let attempts = 0;
        const maxAttempts = 20;
        const checkInterval = setInterval(() => {
          attempts++;
          if (window.api) {
            this.api = window.api;
            clearInterval(checkInterval);
            resolve();
          } else if (attempts >= maxAttempts) {
            clearInterval(checkInterval);
            resolve();
          }
        }, 200);
      }
    });
  }

  async loadTopic() {
    try {
      if (!this.api) {
        throw new Error('API not available');
      }

      const response = await this.api.getTopic(this.topicId);
      this.topic = response.topic;
      this.replies = response.replies || [];
      
      this.renderTopic();
      this.renderReplies();
    } catch (error) {
      console.error('Error loading topic:', error);
      document.getElementById('topicContent').innerHTML = `
        <div class="text-center py-12">
          <span class="material-symbols-outlined text-6xl text-red-500 mb-4">error</span>
          <p class="text-gray-600 dark:text-gray-400">Không thể tải chủ đề. Vui lòng thử lại.</p>
        </div>
      `;
    }
  }

  setupEventListeners() {
    const replyForm = document.getElementById('replyForm');
    if (replyForm) {
      replyForm.addEventListener('submit', (e) => {
        e.preventDefault();
        this.createReply();
      });
    }
  }

  formatTime(dateString) {
    const date = new Date(dateString);
    const now = new Date();
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);

    if (diffMins < 1) return 'Vừa xong';
    if (diffMins < 60) return `${diffMins} phút trước`;
    if (diffHours < 24) return `${diffHours} giờ trước`;
    if (diffDays < 7) return `${diffDays} ngày trước`;
    return date.toLocaleDateString('vi-VN');
  }

  renderTopic() {
    if (!this.topic) return;

    const container = document.getElementById('topicContent');
    const avatar = this.topic.author_avatar || 'https://via.placeholder.com/48?text=' + (this.topic.author_name?.charAt(0) || 'U');
    const timeAgo = this.formatTime(this.topic.created_at);
    
    container.innerHTML = `
      <div class="flex gap-4">
        <div class="w-12 h-12 rounded-full bg-cover flex-shrink-0 bg-gray-200 dark:bg-gray-700" style="background-image: url('${avatar}')"></div>
        <div class="flex-1">
          <div class="flex items-start justify-between gap-4 mb-4">
            <div class="flex-1">
              ${this.topic.is_pinned ? '<span class="inline-flex items-center gap-1 px-2 py-1 bg-primary/10 text-primary text-xs font-bold rounded mb-2"><span class="material-symbols-outlined text-xs">push_pin</span>Đã ghim</span>' : ''}
              <h2 class="text-2xl font-bold mb-2">${this.topic.title}</h2>
              <div class="flex gap-3 text-sm text-gray-600 dark:text-gray-400 mb-4">
                <span>${this.topic.author_name || 'Người dùng'}</span>
                <span>•</span>
                <span>${timeAgo}</span>
                ${this.topic.course_title ? `<span>•</span><span>${this.topic.course_title}</span>` : ''}
              </div>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-sm text-gray-600 dark:text-gray-400">
                <span class="material-symbols-outlined text-base align-middle">visibility</span>
                ${this.topic.view_count || 0}
              </span>
            </div>
          </div>
          <div class="prose dark:prose-invert max-w-none">
            <p class="whitespace-pre-wrap text-gray-700 dark:text-gray-300">${this.topic.content}</p>
          </div>
        </div>
      </div>
    `;
  }

  renderReplies() {
    const container = document.getElementById('repliesList');
    const countEl = document.getElementById('replyCount');
    
    if (countEl) {
      countEl.textContent = this.replies.length;
    }

    if (this.replies.length === 0) {
      container.innerHTML = `
        <div class="text-center py-8 bg-gray-50 dark:bg-gray-800 rounded-lg">
          <span class="material-symbols-outlined text-4xl text-gray-400 mb-2">chat_bubble_outline</span>
          <p class="text-gray-600 dark:text-gray-400">Chưa có trả lời nào.</p>
        </div>
      `;
      return;
    }

    container.innerHTML = this.replies.map(reply => {
      const avatar = reply.author_avatar || 'https://via.placeholder.com/40?text=' + (reply.author_name?.charAt(0) || 'U');
      const timeAgo = this.formatTime(reply.created_at);
      const isSolution = reply.is_solution;
      
      return `
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border ${isSolution ? 'border-green-500' : 'border-gray-200 dark:border-gray-700'} p-6">
          <div class="flex gap-4">
            <div class="w-10 h-10 rounded-full bg-cover flex-shrink-0 bg-gray-200 dark:bg-gray-700" style="background-image: url('${avatar}')"></div>
            <div class="flex-1">
              <div class="flex items-start justify-between gap-4 mb-2">
                <div class="flex items-center gap-2">
                  <span class="font-bold">${reply.author_name || 'Người dùng'}</span>
                  ${isSolution ? '<span class="inline-flex items-center gap-1 px-2 py-1 bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-300 text-xs font-bold rounded-full"><span class="material-symbols-outlined text-xs">check_circle</span>Giải pháp</span>' : ''}
                </div>
                <span class="text-sm text-gray-600 dark:text-gray-400">${timeAgo}</span>
              </div>
              <div class="prose dark:prose-invert max-w-none">
                <p class="whitespace-pre-wrap text-gray-700 dark:text-gray-300">${reply.content}</p>
              </div>
              ${!isSolution && this.topic && this.topic.author_id === (JSON.parse(localStorage.getItem('currentUser') || '{}').user_id) ? `
                <button onclick="topicDetail.markAsSolution(${reply.reply_id})" class="mt-4 text-sm text-primary hover:underline flex items-center gap-1">
                  <span class="material-symbols-outlined text-base">check_circle</span>
                  Đánh dấu là giải pháp
                </button>
              ` : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  async createReply() {
    try {
      if (!this.api) {
        throw new Error('API not available');
      }

      const content = document.getElementById('replyContent').value.trim();
      if (!content) {
        alert('Vui lòng nhập nội dung trả lời');
        return;
      }

      await this.api.createReply(this.topicId, content);
      
      document.getElementById('replyContent').value = '';
      await this.loadTopic();
    } catch (error) {
      console.error('Error creating reply:', error);
      alert('Không thể đăng trả lời. Vui lòng thử lại.');
    }
  }

  async markAsSolution(replyId) {
    try {
      if (!this.api) {
        throw new Error('API not available');
      }

      if (!confirm('Đánh dấu trả lời này là giải pháp?')) {
        return;
      }

      await this.api.markAsSolution(replyId);
      await this.loadTopic();
    } catch (error) {
      console.error('Error marking solution:', error);
      alert('Không thể đánh dấu giải pháp. Vui lòng thử lại.');
    }
  }
}

const topicDetail = new TopicDetail();
</script>
</body>
</html>
