<!DOCTYPE html>
<html class="light" lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - VIAN Academy LMS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#1E3A8A",
          "accent": "#DC2626",
          "background-light": "#F8F9FA",
          "background-dark": "#101922",
        },
        fontFamily: {
          "display": ["Lexend", "sans-serif"]
        },
      },
    },
  }
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .material-symbols-outlined.fill {
    font-variation-settings: 'FILL' 1;
  }
</style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-gray-900 dark:text-gray-100">
<div class="min-h-screen flex items-center justify-center px-4 py-12">
<div class="w-full max-w-md">
<div class="text-center mb-8">
<div class="flex items-center justify-center gap-3 mb-4">
<span class="material-symbols-outlined text-5xl text-primary">school</span>
<h1 class="text-4xl font-bold">VIAN Academy</h1>
</div>
<h2 class="text-2xl font-bold mb-2">Welcome Back</h2>
<p class="text-gray-600 dark:text-gray-400">Sign in to your account to continue</p>
</div>
<div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 p-8">
<form id="loginForm" class="space-y-6" novalidate>
<div id="errorMessage" class="hidden bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg p-4 text-red-700 dark:text-red-300 text-sm"></div>
<div id="successMessage" class="hidden bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-lg p-4 text-green-700 dark:text-green-300 text-sm"></div>
<div>
<label for="email" class="block text-sm font-semibold mb-2">Email Address or Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">email</span>
<input type="text" id="email" name="email" class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="your.email@example.com or admin" autocomplete="username"/>
</div>
</div>
<div>
<label for="password" class="block text-sm font-semibold mb-2">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">lock</span>
<input type="password" id="password" name="password" class="w-full pl-10 pr-12 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="Enter your password" autocomplete="current-password"/>
<button type="button" id="togglePassword" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
<span class="material-symbols-outlined" id="passwordIcon">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center">
<input type="checkbox" id="remember" name="remember" class="size-4 rounded border-gray-300 dark:border-gray-600"/>
<label for="remember" class="ml-2 text-sm text-gray-600 dark:text-gray-400">Remember me</label>
</div>
<a href="#" class="text-sm text-primary hover:underline">Forgot password?</a>
</div>
<button type="submit" id="submitBtn" class="w-full bg-primary hover:bg-blue-800 text-white font-semibold py-3 rounded-lg transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined">login</span>
<span id="submitText">Sign In</span>
</button>
</form>
<div class="mt-6 text-center">
<p class="text-sm text-gray-600 dark:text-gray-400">
Don't have an account?
<a href="register.html" class="text-primary font-semibold hover:underline">Sign up here</a>
</p>
</div>
</div>
</div>
</div>

<script src="../../js/api.js"></script>
<script>
class LoginManager {
  constructor() {
    this.api = null;
    this.init();
  }

  async init() {
    // Wait for API to be available
    await this.waitForAPI();
    
    // Check if user is already logged in
    await this.checkAuthStatus();
    
    // Setup event listeners
    this.setupEventListeners();
    
    console.log('✅ Login page initialized');
  }

  async waitForAPI() {
    return new Promise((resolve) => {
      if (window.api) {
        this.api = window.api;
        resolve();
      } else {
        let attempts = 0;
        const maxAttempts = 20; // 4 seconds max wait
        const checkInterval = setInterval(() => {
          attempts++;
          if (window.api) {
            this.api = window.api;
            clearInterval(checkInterval);
            resolve();
          } else if (attempts >= maxAttempts) {
            clearInterval(checkInterval);
            console.error('API service failed to load');
            this.showError('Không thể tải dịch vụ API. Vui lòng tải lại trang.');
            resolve(); // Continue anyway
          }
        }, 200);
      }
    });
  }

  setupEventListeners() {
    const form = document.getElementById('loginForm');
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const passwordIcon = document.getElementById('passwordIcon');
    const emailInput = document.getElementById('email');

    if (form) {
      // Completely disable HTML5 validation
      form.setAttribute('novalidate', 'true');
      form.noValidate = true;
      
      // Remove required attributes from inputs
      if (emailInput) {
        emailInput.removeAttribute('required');
        emailInput.removeAttribute('pattern');
        emailInput.setCustomValidity('');
        emailInput.addEventListener('invalid', (e) => {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }, true);
      }
      
      if (passwordInput) {
        passwordInput.removeAttribute('required');
        passwordInput.setCustomValidity('');
        passwordInput.addEventListener('invalid', (e) => {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }, true);
      }
      
      // Prevent HTML5 validation on form submit
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        e.stopPropagation();
        this.handleLogin(e);
        return false;
      }, false);
    }
    
    if (togglePassword && passwordInput && passwordIcon) {
      togglePassword.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        passwordIcon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
      });
    }
  }

  async checkAuthStatus() {
    try {
      const storedUser = localStorage.getItem('currentUser');
      let user = null;
      
      if (storedUser) {
        try {
          user = JSON.parse(storedUser);
        } catch (e) {
          console.error('Error parsing stored user:', e);
          localStorage.removeItem('currentUser');
        }
      }

      if (user && user.authenticated) {
        if (this.api && this.api.getCurrentUser) {
          try {
            const userData = await this.api.getCurrentUser();
            if (userData && userData.user) {
              this.redirectToDashboard(userData.user.role || user.role);
              return;
            }
          } catch (error) {
            console.warn('Token verification failed:', error);
            localStorage.removeItem('currentUser');
            localStorage.removeItem('authToken');
            if (this.api && this.api.setToken) {
              this.api.setToken(null);
            }
          }
        } else {
          this.redirectToDashboard(user.role);
        }
      }
    } catch (error) {
      console.error('Error checking auth status:', error);
    }
  }

  redirectToDashboard(role) {
    const roleMap = {
      'admin': '../../pages/admin-dashboard/code.html',
      'instructor': '../../pages/instructor-dashboard/code.html',
      'teacher': '../../pages/instructor-dashboard/code.html',
      'student': '../../pages/student-dashboard/code.html'
    };
    
    const dashboardUrl = roleMap[role] || '../../pages/student-dashboard/code.html';
    
    this.showSuccess('Bạn đã đăng nhập rồi. Đang chuyển hướng...');
    
    setTimeout(() => {
      window.location.href = dashboardUrl;
    }, 1500);
  }

  async handleLogin(e) {
    e.preventDefault();
    e.stopPropagation();
    
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    
    if (!emailInput || !passwordInput) {
      this.showError('Form elements not found');
      return;
    }
    
    // Completely disable HTML5 validation
    emailInput.setCustomValidity('');
    passwordInput.setCustomValidity('');
    emailInput.removeAttribute('required');
    passwordInput.removeAttribute('required');
    
    const email = emailInput.value.trim();
    const password = passwordInput.value;

    this.hideMessages();

    // Validate inputs are not empty
    if (!email || email.trim() === '') {
      this.showError('Vui lòng nhập email hoặc username');
      emailInput.focus();
      return;
    }
    
    if (!password || password.trim() === '') {
      this.showError('Vui lòng nhập mật khẩu');
      passwordInput.focus();
      return;
    }

    // Allow admin and guest as special accounts, otherwise validate email format
    const normalizedEmail = email.toLowerCase().trim();
    if (normalizedEmail !== 'admin' && normalizedEmail !== 'guest') {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(normalizedEmail)) {
        this.showError('Email không hợp lệ. Sử dụng định dạng email hoặc "admin"');
        return;
      }
    }

    const submitBtn = document.getElementById('submitBtn');
    const submitText = document.getElementById('submitText');
    const originalText = submitText?.textContent || 'Sign In';

    try {
      if (submitBtn) submitBtn.disabled = true;
      if (submitText) submitText.textContent = 'Đang đăng nhập...';

      if (!this.api) {
        throw new Error('API service is not available. Please refresh the page.');
      }

      console.log('🔐 Attempting login for:', email);
      console.log('🌐 API Base URL:', window.location.origin + '/api');
      
      // Use normalized email for API call (lowercase, trimmed)
      const emailToSend = email.toLowerCase().trim();
      const response = await this.api.login(emailToSend, password);
      console.log('✅ Login response received:', { 
        hasToken: !!response.token, 
        hasUser: !!response.user,
        userRole: response.user?.role 
      });
      
      if (!response || !response.user) {
        console.error('❌ Invalid response structure:', response);
        throw new Error('Invalid response from server');
      }
      
      localStorage.setItem('currentUser', JSON.stringify({
        ...response.user,
        authenticated: true,
        loginTime: new Date().toISOString()
      }));

      if (response.token && this.api.setToken) {
        this.api.setToken(response.token);
      }

      this.showSuccess('Đăng nhập thành công! Đang chuyển hướng...');
      
      setTimeout(() => {
        this.redirectUser(response.user.role);
      }, 1000);
    } catch (error) {
      console.error('Login error:', error);
      
      let errorMessage = 'Đăng nhập thất bại. Vui lòng thử lại.';
      
      if (error.message) {
        if (error.message.includes('Invalid credentials') || error.message.includes('Invalid email')) {
          errorMessage = 'Email hoặc mật khẩu không đúng.';
        } else if (error.message.includes('verify your email') || error.message.includes('verify')) {
          errorMessage = 'Vui lòng xác thực email trước khi đăng nhập.';
        } else if (error.message.includes('pending admin approval') || error.message.includes('approval')) {
          errorMessage = 'Tài khoản của bạn đang chờ phê duyệt từ quản trị viên. Vui lòng đợi quản trị viên phê duyệt trước khi đăng nhập.';
        } else if (error.message.includes('Cannot connect') || error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
          errorMessage = 'Không thể kết nối đến máy chủ. Vui lòng kiểm tra máy chủ đang chạy.';
        } else {
          errorMessage = error.message;
        }
      }
      
      this.showError(errorMessage);
      
      if (submitBtn) submitBtn.disabled = false;
      if (submitText) submitText.textContent = originalText;
    }
  }

  redirectUser(role) {
    const roleMap = {
      'admin': '../../pages/admin-dashboard/code.html',
      'instructor': '../../pages/instructor-dashboard/code.html',
      'teacher': '../../pages/instructor-dashboard/code.html',
      'student': '../../pages/student-dashboard/code.html'
    };
    
    window.location.href = roleMap[role] || '../../pages/student-dashboard/code.html';
  }

  showError(message) {
    const errorDiv = document.getElementById('errorMessage');
    const successDiv = document.getElementById('successMessage');
    if (errorDiv) {
      errorDiv.textContent = message;
      errorDiv.classList.remove('hidden');
    }
    if (successDiv) successDiv.classList.add('hidden');
  }

  showSuccess(message) {
    const successDiv = document.getElementById('successMessage');
    const errorDiv = document.getElementById('errorMessage');
    if (successDiv) {
      successDiv.textContent = message;
      successDiv.classList.remove('hidden');
    }
    if (errorDiv) errorDiv.classList.add('hidden');
  }

  hideMessages() {
    const errorDiv = document.getElementById('errorMessage');
    const successDiv = document.getElementById('successMessage');
    if (errorDiv) errorDiv.classList.add('hidden');
    if (successDiv) successDiv.classList.add('hidden');
  }
}

// Initialize on page load
let loginManager;
document.addEventListener('DOMContentLoaded', () => {
  loginManager = new LoginManager();
});
</script>
</body>
</html>
