<!DOCTYPE html>
<html class="light" lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register - VIAN Academy LMS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#1E3A8A",
          "accent": "#DC2626",
          "background-light": "#F8F9FA",
          "background-dark": "#101922",
        },
        fontFamily: {
          "display": ["Lexend", "sans-serif"]
        },
      },
    },
  }
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .material-symbols-outlined.fill {
    font-variation-settings: 'FILL' 1;
  }
</style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-gray-900 dark:text-gray-100">
<div class="min-h-screen flex items-center justify-center px-4 py-12">
<div class="w-full max-w-2xl">
<div class="text-center mb-8">
<div class="flex items-center justify-center gap-3 mb-4">
<span class="material-symbols-outlined text-5xl text-primary">school</span>
<h1 class="text-4xl font-bold">VIAN Academy</h1>
</div>
<h2 class="text-2xl font-bold mb-2">Create Your Account</h2>
<p class="text-gray-600 dark:text-gray-400">Join our learning community</p>
</div>

<!-- User Type Selection -->
<div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 p-8 mb-6">
<div class="mb-6">
<label class="block text-sm font-semibold mb-3">I want to register as:</label>
<div class="grid grid-cols-2 gap-4">
<button type="button" id="studentBtn" class="user-type-btn active flex flex-col items-center gap-3 p-6 border-2 border-primary bg-primary/10 rounded-lg hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-4xl text-primary">person</span>
<span class="font-bold text-primary">Student</span>
<span class="text-xs text-gray-600 dark:text-gray-400">Learn and grow</span>
</button>
<button type="button" id="teacherBtn" class="user-type-btn flex flex-col items-center gap-3 p-6 border-2 border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
<span class="material-symbols-outlined text-4xl text-gray-600 dark:text-gray-400">school</span>
<span class="font-bold text-gray-600 dark:text-gray-400">Teacher</span>
<span class="text-xs text-gray-600 dark:text-gray-400">Teach and inspire</span>
</button>
</div>
</div>
</div>

<!-- Registration Form -->
<div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 p-8">
<form id="registerForm" class="space-y-6">
<div id="errorMessage" class="hidden bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg p-4 text-red-700 dark:text-red-300 text-sm"></div>
<div id="successMessage" class="hidden bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-lg p-4 text-green-700 dark:text-green-300 text-sm"></div>

<!-- Common Fields -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div>
<label for="firstName" class="block text-sm font-semibold mb-2">First Name *</label>
<input type="text" id="firstName" name="firstName" required class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="John"/>
</div>
<div>
<label for="lastName" class="block text-sm font-semibold mb-2">Last Name *</label>
<input type="text" id="lastName" name="lastName" required class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="Doe"/>
</div>
</div>

<div>
<label for="email" class="block text-sm font-semibold mb-2">Email Address *</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">email</span>
<input type="email" id="email" name="email" required class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="your.email@example.com"/>
</div>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div>
<label for="password" class="block text-sm font-semibold mb-2">Password *</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">lock</span>
<input type="password" id="password" name="password" required minlength="8" class="w-full pl-10 pr-12 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="Min. 8 characters"/>
<button type="button" class="toggle-password absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<p class="text-xs text-gray-500 mt-1">Must be at least 8 characters</p>
</div>
<div>
<label for="confirmPassword" class="block text-sm font-semibold mb-2">Confirm Password *</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">lock</span>
<input type="password" id="confirmPassword" name="confirmPassword" required class="w-full pl-10 pr-12 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="Confirm password"/>
<button type="button" class="toggle-password absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
</div>

<div>
<label for="phone" class="block text-sm font-semibold mb-2">Phone Number</label>
<input type="tel" id="phone" name="phone" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="+1 (555) 123-4567"/>
</div>

<!-- Student Specific Fields -->
<div id="studentFields" class="user-type-fields">
<div>
<label for="studentBio" class="block text-sm font-semibold mb-2">Bio (Optional)</label>
<textarea id="studentBio" name="studentBio" rows="3" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="Tell us about yourself..."></textarea>
</div>
</div>

<!-- Teacher Specific Fields -->
<div id="teacherFields" class="user-type-fields hidden">
<div>
<label for="teacherBio" class="block text-sm font-semibold mb-2">Professional Bio *</label>
<textarea id="teacherBio" name="teacherBio" rows="3" required class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="Describe your teaching experience and expertise..."></textarea>
</div>
<div>
<label for="expertise" class="block text-sm font-semibold mb-2">Areas of Expertise *</label>
<input type="text" id="expertise" name="expertise" required class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="e.g., Web Development, Data Science, Design"/>
<p class="text-xs text-gray-500 mt-1">List your main teaching areas</p>
</div>
<div>
<label for="experience" class="block text-sm font-semibold mb-2">Years of Experience *</label>
<select id="experience" name="experience" required class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary">
<option value="">Select experience</option>
<option value="0-1">0-1 years</option>
<option value="2-5">2-5 years</option>
<option value="6-10">6-10 years</option>
<option value="10+">10+ years</option>
</select>
</div>
<div>
<label for="qualifications" class="block text-sm font-semibold mb-2">Qualifications / Certifications</label>
<textarea id="qualifications" name="qualifications" rows="2" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="List your degrees, certifications, etc."></textarea>
</div>
<div>
<label for="website" class="block text-sm font-semibold mb-2">Website / Portfolio (Optional)</label>
<input type="url" id="website" name="website" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="https://yourwebsite.com"/>
</div>
</div>

<div class="flex items-start">
<input type="checkbox" id="terms" name="terms" required class="mt-1 size-4 rounded border-gray-300 dark:border-gray-600"/>
<label for="terms" class="ml-2 text-sm text-gray-600 dark:text-gray-400">
I agree to the <a href="../../pages/legal/_chính_sách/code.html" class="text-primary hover:underline">Terms of Service</a> and <a href="../../pages/legal/_chính_sách/code.html" class="text-primary hover:underline">Privacy Policy</a> *
</label>
</div>

<button type="submit" id="submitBtn" class="w-full bg-primary hover:bg-blue-800 text-white font-semibold py-3 rounded-lg transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined">person_add</span>
<span id="submitText">Create Account</span>
</button>
</form>

<div class="mt-6 text-center">
<p class="text-sm text-gray-600 dark:text-gray-400">
Already have an account?
<a href="login.html" class="text-primary font-semibold hover:underline">Sign in here</a>
</p>
</div>
</div>
</div>
</div>

<script src="../../js/api.js"></script>
<script>
class RegisterManager {
  constructor() {
    this.userType = 'student';
    this.api = null;
    this.init();
  }

  async init() {
    await this.waitForAPI();
    await this.checkAuthStatus();
    this.setupEventListeners();
    this.switchUserType('student');
    console.log('✅ Register page initialized');
  }

  async waitForAPI() {
    return new Promise((resolve) => {
      if (window.api) {
        this.api = window.api;
        resolve();
      } else {
        let attempts = 0;
        const maxAttempts = 20;
        const checkInterval = setInterval(() => {
          attempts++;
          if (window.api) {
            this.api = window.api;
            clearInterval(checkInterval);
            resolve();
          } else if (attempts >= maxAttempts) {
            clearInterval(checkInterval);
            console.error('API service failed to load');
            this.showError('Không thể tải dịch vụ API. Vui lòng tải lại trang.');
            resolve();
          }
        }, 200);
      }
    });
  }

  async checkAuthStatus() {
    try {
      const storedUser = localStorage.getItem('currentUser');
      let user = null;
      
      if (storedUser) {
        try {
          user = JSON.parse(storedUser);
        } catch (e) {
          localStorage.removeItem('currentUser');
        }
      }

      if (user && user.authenticated) {
        if (this.api && this.api.getCurrentUser) {
          try {
            const userData = await this.api.getCurrentUser();
            if (userData && userData.user) {
              this.redirectToDashboard(userData.user.role || user.role);
              return;
            }
          } catch (error) {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('authToken');
            if (this.api && this.api.setToken) {
              this.api.setToken(null);
            }
          }
        } else {
          this.redirectToDashboard(user.role);
        }
      }
    } catch (error) {
      console.error('Error checking auth status:', error);
    }
  }

  redirectToDashboard(role) {
    const roleMap = {
      'admin': '../../pages/admin-dashboard/code.html',
      'instructor': '../../pages/instructor-dashboard/code.html',
      'teacher': '../../pages/instructor-dashboard/code.html',
      'student': '../../pages/student-dashboard/code.html'
    };
    
    const dashboardUrl = roleMap[role] || '../../pages/student-dashboard/code.html';
    this.showSuccess('Bạn đã đăng nhập rồi. Đang chuyển hướng...');
    
    setTimeout(() => {
      window.location.href = dashboardUrl;
    }, 1500);
  }

  setupEventListeners() {
    const form = document.getElementById('registerForm');
    const studentBtn = document.getElementById('studentBtn');
    const teacherBtn = document.getElementById('teacherBtn');
    const togglePasswordBtns = document.querySelectorAll('.toggle-password');

    if (form) {
      form.addEventListener('submit', (e) => this.handleRegister(e));
    }
    
    if (studentBtn) {
      studentBtn.addEventListener('click', () => this.switchUserType('student'));
    }
    
    if (teacherBtn) {
      teacherBtn.addEventListener('click', () => this.switchUserType('teacher'));
    }

    togglePasswordBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const relativeDiv = e.target.closest('.relative');
        if (!relativeDiv) return;
        const input = relativeDiv.querySelector('input');
        const icon = btn.querySelector('.material-symbols-outlined');
        if (input && icon) {
          const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
          input.setAttribute('type', type);
          icon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        }
      });
    });
  }

  switchUserType(type) {
    this.userType = type;
    const studentBtn = document.getElementById('studentBtn');
    const teacherBtn = document.getElementById('teacherBtn');
    const studentFields = document.getElementById('studentFields');
    const teacherFields = document.getElementById('teacherFields');

    if (type === 'student') {
      if (studentBtn) {
        studentBtn.classList.add('active', 'border-primary', 'bg-primary/10');
        studentBtn.classList.remove('border-gray-300', 'dark:border-gray-600');
        const studentIcon = studentBtn.querySelector('span.material-symbols-outlined');
        const studentText = studentBtn.querySelector('.font-bold');
        if (studentIcon) {
          studentIcon.classList.add('text-primary');
          studentIcon.classList.remove('text-gray-600', 'dark:text-gray-400');
        }
        if (studentText) {
          studentText.classList.add('text-primary');
          studentText.classList.remove('text-gray-600', 'dark:text-gray-400');
        }
      }
      
      if (teacherBtn) {
        teacherBtn.classList.remove('active', 'border-primary', 'bg-primary/10');
        teacherBtn.classList.add('border-gray-300', 'dark:border-gray-600');
        const teacherIcon = teacherBtn.querySelector('span.material-symbols-outlined');
        const teacherText = teacherBtn.querySelector('.font-bold');
        if (teacherIcon) {
          teacherIcon.classList.remove('text-primary');
          teacherIcon.classList.add('text-gray-600', 'dark:text-gray-400');
        }
        if (teacherText) {
          teacherText.classList.remove('text-primary');
          teacherText.classList.add('text-gray-600', 'dark:text-gray-400');
        }
      }
      
      if (studentFields) studentFields.classList.remove('hidden');
      if (teacherFields) {
        teacherFields.classList.add('hidden');
        teacherFields.querySelectorAll('[required]').forEach(field => {
          if (['teacherBio', 'expertise', 'experience'].includes(field.id)) {
            field.removeAttribute('required');
          }
        });
      }
    } else {
      if (teacherBtn) {
        teacherBtn.classList.add('active', 'border-primary', 'bg-primary/10');
        teacherBtn.classList.remove('border-gray-300', 'dark:border-gray-600');
        const teacherIcon = teacherBtn.querySelector('span.material-symbols-outlined');
        const teacherText = teacherBtn.querySelector('.font-bold');
        if (teacherIcon) {
          teacherIcon.classList.add('text-primary');
          teacherIcon.classList.remove('text-gray-600', 'dark:text-gray-400');
        }
        if (teacherText) {
          teacherText.classList.add('text-primary');
          teacherText.classList.remove('text-gray-600', 'dark:text-gray-400');
        }
      }
      
      if (studentBtn) {
        studentBtn.classList.remove('active', 'border-primary', 'bg-primary/10');
        studentBtn.classList.add('border-gray-300', 'dark:border-gray-600');
        const studentIcon = studentBtn.querySelector('span.material-symbols-outlined');
        const studentText = studentBtn.querySelector('.font-bold');
        if (studentIcon) {
          studentIcon.classList.remove('text-primary');
          studentIcon.classList.add('text-gray-600', 'dark:text-gray-400');
        }
        if (studentText) {
          studentText.classList.remove('text-primary');
          studentText.classList.add('text-gray-600', 'dark:text-gray-400');
        }
      }
      
      if (studentFields) studentFields.classList.add('hidden');
      if (teacherFields) {
        teacherFields.classList.remove('hidden');
        const teacherBio = document.getElementById('teacherBio');
        const expertise = document.getElementById('expertise');
        const experience = document.getElementById('experience');
        if (teacherBio) teacherBio.setAttribute('required', 'required');
        if (expertise) expertise.setAttribute('required', 'required');
        if (experience) experience.setAttribute('required', 'required');
      }
    }
  }

  async handleRegister(e) {
    e.preventDefault();
    this.hideMessages();

    const formData = new FormData(e.target);
    const data = {
      firstName: formData.get('firstName'),
      lastName: formData.get('lastName'),
      email: formData.get('email'),
      password: formData.get('password'),
      confirmPassword: formData.get('confirmPassword'),
      phone: formData.get('phone'),
      role: this.userType === 'student' ? 'student' : 'instructor',
      bio: this.userType === 'student' ? formData.get('studentBio') : formData.get('teacherBio'),
      expertise: formData.get('expertise') || '',
      experience: formData.get('experience') || '',
      qualifications: formData.get('qualifications') || '',
      website: formData.get('website') || ''
    };

    if (!data.firstName || !data.lastName || !data.email || !data.password) {
      this.showError('Vui lòng điền đầy đủ các trường bắt buộc');
      return;
    }

    if (data.password !== data.confirmPassword) {
      this.showError('Mật khẩu không khớp');
      return;
    }

    if (data.password.length < 8) {
      this.showError('Mật khẩu phải có ít nhất 8 ký tự');
      return;
    }

    if (this.userType === 'teacher') {
      if (!data.bio || !data.expertise || !data.experience) {
        this.showError('Vui lòng điền đầy đủ các trường dành cho giảng viên');
        return;
      }
    }

    const submitBtn = document.getElementById('submitBtn');
    const submitText = document.getElementById('submitText');
    const originalText = submitText?.textContent || 'Create Account';

    try {
      if (submitBtn) submitBtn.disabled = true;
      if (submitText) submitText.textContent = 'Đang tạo tài khoản...';

      if (!this.api) {
        throw new Error('API service is not available. Please refresh the page.');
      }

      const response = await this.api.register({
        email: data.email,
        password: data.password,
        firstName: data.firstName,
        lastName: data.lastName,
        role: data.role,
        phone: data.phone || null,
        bio: data.bio || null
      });

      if (data.role === 'instructor') {
        this.showSuccess(`Đăng ký thành công! Vui lòng kiểm tra email (${data.email}) để xác thực tài khoản. Sau khi xác thực, tài khoản của bạn sẽ được quản trị viên xem xét.`);
      } else {
        this.showSuccess(`Đăng ký thành công! Vui lòng kiểm tra email (${data.email}) để xác thực tài khoản.`);
      }

      console.log('Registration successful:', response);

      setTimeout(() => {
        e.target.reset();
        if (response.verificationToken) {
          window.location.href = `verify-email.html?email=${encodeURIComponent(data.email)}&token=${response.verificationToken}`;
        } else {
          window.location.href = 'login.html';
        }
      }, 3000);
    } catch (error) {
      console.error('Registration error:', error);
      this.showError(error.message || 'Đăng ký thất bại. Vui lòng thử lại.');
      
      if (submitBtn) submitBtn.disabled = false;
      if (submitText) submitText.textContent = originalText;
    }
  }

  showError(message) {
    const errorDiv = document.getElementById('errorMessage');
    const successDiv = document.getElementById('successMessage');
    if (errorDiv) {
      errorDiv.textContent = message;
      errorDiv.classList.remove('hidden');
    }
    if (successDiv) successDiv.classList.add('hidden');
  }

  showSuccess(message) {
    const successDiv = document.getElementById('successMessage');
    const errorDiv = document.getElementById('errorMessage');
    if (successDiv) {
      successDiv.textContent = message;
      successDiv.classList.remove('hidden');
    }
    if (errorDiv) errorDiv.classList.add('hidden');
  }

  hideMessages() {
    const errorDiv = document.getElementById('errorMessage');
    const successDiv = document.getElementById('successMessage');
    if (errorDiv) errorDiv.classList.add('hidden');
    if (successDiv) successDiv.classList.add('hidden');
  }
}

let registerManager;
document.addEventListener('DOMContentLoaded', () => {
  registerManager = new RegisterManager();
});
</script>
</body>
</html>
