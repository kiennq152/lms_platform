<span class="material-symbols-outlined absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">search</span>
<input id="searchInput" type="text" placeholder="Search courses..." class="pl-10 pr-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary"/>

<option value="all">All Status</option>

<script src="../../js/api.js"></script>
<script>
class CoursesManager {
  constructor() {
    this.api = window.api;
    this.courses = [];
    this.filteredCourses = [];
    this.init();
  }

  async init() {
    await this.waitForAPI();
    await this.loadCourses();
    this.setupEventListeners();
    this.renderCourses();
  }

  async waitForAPI() {
    if (window.api) {
      this.api = window.api;
      return;
    }
    
    // Wait for API to load
    return new Promise((resolve) => {
      const checkAPI = setInterval(() => {
        if (window.api) {
          this.api = window.api;
          clearInterval(checkAPI);
          resolve();
        }
      }, 100);
      
      // Timeout after 5 seconds
      setTimeout(() => {
        clearInterval(checkAPI);
        console.error('API not available after 5 seconds');
        resolve();
      }, 5000);
    });
  }

  async loadCourses() {
    try {
      if (!this.api) {
        console.warn('API not available, using localStorage fallback');
        const saved = localStorage.getItem('instructor_courses');
        this.courses = saved ? JSON.parse(saved) : [];
        this.filteredCourses = [...this.courses];
        return;
      }

      // Set auth token
      const token = localStorage.getItem('authToken');
      if (token) {
        this.api.setToken(token);
      }

      // Load from API
      const response = await this.api.getInstructorCourses();
      
      if (response && response.courses && Array.isArray(response.courses)) {
        // Transform API courses to match expected format
        this.courses = response.courses.map(course => ({
          id: course.course_id,
          course_id: course.course_id,
          title: course.title,
          description: course.description,
          shortDescription: course.short_description,
          price: parseFloat(course.price) || 0,
          status: course.status,
          thumbnail: course.thumbnail_url,
          category: course.category_name,
          students: parseInt(course.enrollment_count || 0),
          rating: parseFloat(course.average_rating || 0),
          modules: course.modules || [],
          createdAt: course.created_at,
          updatedAt: course.updated_at
        }));
        
        // Also save to localStorage as backup
        localStorage.setItem('instructor_courses', JSON.stringify(this.courses));
      } else {
        // Fallback to localStorage
        const saved = localStorage.getItem('instructor_courses');
        this.courses = saved ? JSON.parse(saved) : [];
      }
      
      this.filteredCourses = [...this.courses];
    } catch (error) {
      console.error('Error loading courses:', error);
      // Fallback to localStorage
      const saved = localStorage.getItem('instructor_courses');
      this.courses = saved ? JSON.parse(saved) : [];
      this.filteredCourses = [...this.courses];
      alert('Failed to load courses from server. Using cached data.');
    }
  }

  setupEventListeners() {
    document.getElementById('searchInput').addEventListener('input', (e) => this.handleSearch(e));
    document.getElementById('statusFilter').addEventListener('change', () => this.applyFilters());
  }

  handleSearch(e) {
    const query = e.target.value.toLowerCase();
    this.applyFilters(query);
  }

  applyFilters(searchQuery = '') {
    const statusFilter = document.getElementById('statusFilter').value;
    
    this.filteredCourses = this.courses.filter(course => {
      const matchesSearch = !searchQuery || course.title.toLowerCase().includes(searchQuery);
      const matchesStatus = statusFilter === 'all' || course.status === statusFilter;
      return matchesSearch && matchesStatus;
    });
    
    this.renderCourses();
  }

  renderCourses() {
    const grid = document.getElementById('coursesGrid');
    
    if (this.filteredCourses.length === 0) {
      grid.innerHTML = `
        <div class="col-span-full text-center py-12">
          <span class="material-symbols-outlined text-6xl text-gray-400 mb-4">school</span>
          <p class="text-gray-600 dark:text-gray-400 text-lg mb-4">No courses found</p>
          <button onclick="window.location.href='course-editor.html?new=true'" class="px-6 py-3 bg-primary text-white rounded-lg hover:bg-red-600 transition-colors font-semibold">
            Create Your First Course
          </button>
        </div>
      `;
      return;
    }
    
    grid.innerHTML = this.filteredCourses.map(course => `
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden shadow-sm hover:shadow-lg transition-all">
        <div class="aspect-video bg-gradient-to-br from-primary/20 to-secondary/20 flex items-center justify-center">
          ${course.thumbnail ? 
            `<img src="${course.thumbnail}" alt="${course.title}" class="w-full h-full object-cover"/>` :
            `<span class="material-symbols-outlined text-6xl text-gray-400">school</span>`
          }
        </div>
        <div class="p-6">
          <div class="flex items-start justify-between mb-3">
            <h3 class="text-lg font-bold text-gray-900 dark:text-white flex-1">${course.title}</h3>
            <span class="ml-2 px-2 py-1 text-xs font-bold rounded-full ${
              course.status === 'published' ? 'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-300' :
              course.status === 'draft' ? 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-300' :
              'bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-300'
            }">${course.status}</span>
          </div>
          <p class="text-sm text-gray-600 dark:text-gray-400 mb-4 line-clamp-2">${course.shortDescription || course.description || 'No description'}</p>
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-4 text-sm text-gray-600 dark:text-gray-400">
              <span class="flex items-center gap-1">
                <span class="material-symbols-outlined text-base">group</span>
                ${course.students || 0}
              </span>
              <span class="flex items-center gap-1">
                <span class="material-symbols-outlined text-base">play_circle</span>
                ${course.modules?.reduce((sum, m) => sum + (m.lessons?.length || 0), 0) || 0}
              </span>
            </div>
            <span class="text-lg font-bold text-primary">${course.price || '$0'}</span>
          </div>
          <div class="flex gap-2">
            <button onclick="coursesMgmt.editCourse(${course.id || course.course_id})" class="flex-1 px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors font-semibold text-sm">
              Edit
            </button>
            <button onclick="coursesMgmt.viewCourse(${course.id || course.course_id})" class="flex-1 px-4 py-2 bg-primary text-white rounded-lg hover:bg-red-600 transition-colors font-semibold text-sm">
              View
            </button>
            <button onclick="coursesMgmt.deleteCourse(${course.id || course.course_id})" class="px-4 py-2 border border-red-300 dark:border-red-600 text-red-600 dark:text-red-400 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors font-semibold text-sm" title="Delete">
              <span class="material-symbols-outlined text-base">delete</span>
            </button>
          </div>
        </div>
      </div>
    `).join('');
  }

  async deleteCourse(id) {
    if (!confirm('Are you sure you want to delete this course? This action cannot be undone.')) {
      return;
    }

    try {
      if (this.api) {
        await this.api.deleteCourse(id);
        alert('Course deleted successfully!');
      } else {
        // Fallback: remove from localStorage
        this.courses = this.courses.filter(c => c.id != id && c.course_id != id);
        localStorage.setItem('instructor_courses', JSON.stringify(this.courses));
        alert('Course deleted from local cache.');
      }
      
      // Reload courses
      await this.loadCourses();
      this.applyFilters();
    } catch (error) {
      console.error('Error deleting course:', error);
      alert('Failed to delete course: ' + (error.message || 'Unknown error'));
    }
  }

  editCourse(id) {
    window.location.href = `course-editor.html?id=${id}`;
  }

  viewCourse(id) {
    window.location.href = `../../pages/course-detail/code.html?courseId=${id}`;
  }
}

function handleLogout(e) {
  e.preventDefault();
  if (confirm('Are you sure you want to logout?')) {
    if (window.api) {
      window.api.logout();
    }
    localStorage.removeItem('authToken');
    localStorage.removeItem('currentUser');
    window.location.href = '../../pages/auth/login.html';
  }
}

let coursesMgmt;
document.addEventListener('DOMContentLoaded', () => {
  coursesMgmt = new CoursesManager();
});
</script>
