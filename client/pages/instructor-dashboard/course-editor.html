<script src="../../js/api.js"></script>
<script>
class CourseEditor {
  constructor() {
    this.api = window.api || null;
    this.courseId = this.getCourseId();
    this.modules = [];
    this.init();
  }

  async init() {
    await this.waitForAPI();
    this.setupEventListeners();
    await this.loadCourseData();
    this.updateStats();
  }

  async waitForAPI() {
    if (this.api) {
      // Set auth token if available
      const token = localStorage.getItem('authToken');
      if (token && this.api.setToken) {
        this.api.setToken(token);
      }
      return;
    }
    
    return new Promise((resolve) => {
      const checkAPI = setInterval(() => {
        if (window.api) {
          this.api = window.api;
          // Set auth token if available
          const token = localStorage.getItem('authToken');
          if (token && this.api.setToken) {
            this.api.setToken(token);
          }
          clearInterval(checkAPI);
          resolve();
        }
      }, 100);
      setTimeout(() => {
        clearInterval(checkAPI);
        console.warn('API not available after 5 seconds, continuing without API');
        resolve();
      }, 5000);
    });
  }

  getCourseId() {
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    const isNew = urlParams.get('new') === 'true';
    const courseId = isNew ? null : id;
    console.log('Course ID from URL:', courseId, 'isNew:', isNew);
    return courseId;
  }

  setupEventListeners() {
    document.getElementById('addModuleBtn').addEventListener('click', () => this.addModule());
    document.getElementById('saveDraftBtn').addEventListener('click', async () => await this.saveCourse('draft'));
    document.getElementById('publishBtn').addEventListener('click', async () => await this.saveCourse('published'));
    document.getElementById('thumbnailUpload').addEventListener('change', (e) => this.handleThumbnailUpload(e));
    
    // Delegate events for dynamic content
    document.addEventListener('click', (e) => {
      if (e.target.closest('.add-lesson-btn')) {
        const moduleItem = e.target.closest('.module-item');
        this.addLesson(moduleItem);
      }
      if (e.target.closest('.delete-module')) {
        const moduleItem = e.target.closest('.module-item');
        this.deleteModule(moduleItem);
      }
      if (e.target.closest('.delete-lesson')) {
        const lessonItem = e.target.closest('.lesson-item');
        this.deleteLesson(lessonItem);
      }
      if (e.target.closest('.preview-youtube')) {
        const lessonItem = e.target.closest('.lesson-item');
        this.previewYouTube(lessonItem);
      }
    });
    
    document.addEventListener('change', (e) => {
      if (e.target.classList.contains('lesson-type')) {
        const lessonItem = e.target.closest('.lesson-item');
        this.handleContentTypeChange(lessonItem, e.target.value);
      }
      if (e.target.classList.contains('exercise-file') || e.target.classList.contains('document-file')) {
        const lessonItem = e.target.closest('.lesson-item');
        this.handleFileUpload(lessonItem, e.target);
      }
    });
  }

  addModule() {
    const template = document.getElementById('moduleTemplate');
    const moduleClone = template.content.cloneNode(true);
    const modulesContainer = document.getElementById('modulesContainer');
    modulesContainer.appendChild(moduleClone);
    this.updateStats();
  }

  addLesson(moduleItem) {
    const template = document.getElementById('lessonTemplate');
    const lessonClone = template.content.cloneNode(true);
    const lessonsContainer = moduleItem.querySelector('.lessons-container');
    const lessonElement = lessonsContainer.appendChild(lessonClone);
    
    // Show YouTube upload section by default (since video is the default type)
    const lessonItem = lessonsContainer.lastElementChild;
    if (lessonItem) {
      const lessonType = lessonItem.querySelector('.lesson-type');
      if (lessonType && lessonType.value === 'video') {
        this.handleContentTypeChange(lessonItem, 'video');
      }
    }
    
    this.updateStats();
  }

  deleteModule(moduleItem) {
    if (!confirm('Are you sure you want to delete this module and all its lessons?')) return;
    moduleItem.remove();
    this.updateStats();
  }

  deleteLesson(lessonItem) {
    if (!confirm('Are you sure you want to delete this lesson?')) return;
    lessonItem.remove();
    this.updateStats();
  }

  handleContentTypeChange(lessonItem, type) {
    const uploadArea = lessonItem.querySelector('.content-upload-area');
    if (!uploadArea) {
      console.warn('Content upload area not found in lesson item');
      return;
    }
    
    const youtubeUpload = uploadArea.querySelector('.youtube-upload');
    const textContent = uploadArea.querySelector('.text-content');
    const fileUploads = uploadArea.querySelector('.file-uploads');
    
    if (!youtubeUpload || !textContent || !fileUploads) {
      console.warn('Content type sections not found:', { youtubeUpload, textContent, fileUploads });
      return;
    }
    
    // Hide all
    youtubeUpload.classList.add('hidden');
    textContent.classList.add('hidden');
    fileUploads.classList.add('hidden');
    
    // Show relevant one
    if (type === 'video') {
      youtubeUpload.classList.remove('hidden');
      console.log('YouTube upload section shown');
    } else if (type === 'text') {
      textContent.classList.remove('hidden');
      console.log('Text content section shown');
    } else {
      fileUploads.classList.remove('hidden');
      console.log('File uploads section shown');
    }
  }

  previewYouTube(lessonItem) {
    const urlInput = lessonItem.querySelector('.youtube-url');
    const url = urlInput.value.trim();
    const previewDiv = lessonItem.querySelector('#youtubePreview');
    
    if (!url) {
      alert('Please enter a YouTube URL');
      return;
    }
    
    // Extract video ID from various YouTube URL formats
    const videoId = this.extractYouTubeId(url);
    if (!videoId) {
      alert('Invalid YouTube URL');
      return;
    }
    
    previewDiv.innerHTML = `
      <div class="aspect-video rounded-lg overflow-hidden border border-gray-300 dark:border-gray-600">
        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
      <p class="text-xs text-gray-500 dark:text-gray-400 mt-2">Preview of YouTube video</p>
    `;
    previewDiv.classList.remove('hidden');
  }

  extractYouTubeId(url) {
    const patterns = [
      /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/,
      /youtube\.com\/watch\?.*v=([^&\n?#]+)/
    ];
    
    for (const pattern of patterns) {
      const match = url.match(pattern);
      if (match) return match[1];
    }
    return null;
  }

  handleFileUpload(lessonItem, fileInput) {
    const files = Array.from(fileInput.files);
    const uploadedFilesDiv = lessonItem.querySelector('#uploadedFiles');
    
    files.forEach(file => {
      const fileItem = document.createElement('div');
      fileItem.className = 'flex items-center justify-between p-2 bg-gray-50 dark:bg-gray-900 rounded-lg';
      fileItem.innerHTML = `
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-base text-gray-500">description</span>
          <span class="text-sm font-semibold">${file.name}</span>
          <span class="text-xs text-gray-500">(${this.formatFileSize(file.size)})</span>
        </div>
        <button class="remove-file p-1 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded transition-colors">
          <span class="material-symbols-outlined text-base">close</span>
        </button>
      `;
      
      fileItem.querySelector('.remove-file').addEventListener('click', () => {
        fileItem.remove();
        // Remove from file input
        const dt = new DataTransfer();
        Array.from(fileInput.files).forEach(f => {
          if (f.name !== file.name) dt.items.add(f);
        });
        fileInput.files = dt.files;
      });
      
      uploadedFilesDiv.appendChild(fileItem);
    });
  }

  formatFileSize(bytes) {
    if (bytes === 0) return '0 Bytes';
    const k = 1024;
    const sizes = ['Bytes', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
  }

  restoreUploadedFiles(lessonItem, exerciseFiles, documentFiles) {
    const uploadedFilesDiv = lessonItem.querySelector('#uploadedFiles');
    if (!uploadedFilesDiv) return;
    
    // Clear existing display
    uploadedFilesDiv.innerHTML = '';
    
    // Restore exercise files
    if (exerciseFiles && Array.isArray(exerciseFiles) && exerciseFiles.length > 0) {
      exerciseFiles.forEach(file => {
        const fileItem = document.createElement('div');
        fileItem.className = 'flex items-center justify-between p-2 bg-gray-50 dark:bg-gray-900 rounded-lg mb-2';
        fileItem.innerHTML = `
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-base text-gray-500">description</span>
            <span class="text-sm font-semibold">${file.name || file.file_name || 'Exercise File'}</span>
            ${file.size ? `<span class="text-xs text-gray-500">(${this.formatFileSize(file.size)})</span>` : ''}
            <span class="text-xs text-primary font-semibold">[Exercise]</span>
          </div>
          <button class="remove-file p-1 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded transition-colors" data-file-name="${file.name || file.file_name}">
            <span class="material-symbols-outlined text-base">close</span>
          </button>
        `;
        
        fileItem.querySelector('.remove-file').addEventListener('click', () => {
          fileItem.remove();
        });
        
        uploadedFilesDiv.appendChild(fileItem);
      });
    }
    
    // Restore document files
    if (documentFiles && Array.isArray(documentFiles) && documentFiles.length > 0) {
      documentFiles.forEach(file => {
        const fileItem = document.createElement('div');
        fileItem.className = 'flex items-center justify-between p-2 bg-gray-50 dark:bg-gray-900 rounded-lg mb-2';
        fileItem.innerHTML = `
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-base text-gray-500">description</span>
            <span class="text-sm font-semibold">${file.name || file.file_name || 'Document File'}</span>
            ${file.size ? `<span class="text-xs text-gray-500">(${this.formatFileSize(file.size)})</span>` : ''}
            <span class="text-xs text-primary font-semibold">[Document]</span>
          </div>
          <button class="remove-file p-1 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded transition-colors" data-file-name="${file.name || file.file_name}">
            <span class="material-symbols-outlined text-base">close</span>
          </button>
        `;
        
        fileItem.querySelector('.remove-file').addEventListener('click', () => {
          fileItem.remove();
        });
        
        uploadedFilesDiv.appendChild(fileItem);
      });
    }
  }

  handleThumbnailUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    if (!file.type.startsWith('image/')) {
      alert('Please select an image file');
      return;
    }
    
    const reader = new FileReader();
    reader.onload = (event) => {
      const preview = document.getElementById('thumbnailPreview');
      const img = document.getElementById('thumbnailImg');
      img.src = event.target.result;
      preview.classList.remove('hidden');
    };
    reader.readAsDataURL(file);
  }

  async saveCourse(status) {
    const categoryValue = document.getElementById('courseCategory').value;
    // Handle category - if it's empty string, set to null, otherwise try to parse as number
    let category_id = null;
    if (categoryValue && categoryValue.trim() !== '') {
      // If it's a number string, parse it
      const parsed = parseInt(categoryValue);
      category_id = isNaN(parsed) ? null : parsed;
    }
    
    const courseData = {
      title: document.getElementById('courseTitle').value.trim(),
      short_description: document.getElementById('shortDescription').value.trim() || null,
      description: document.getElementById('courseDescription').value.trim(),
      price: parseFloat(document.getElementById('coursePrice').value),
      category_id: category_id,
      level: document.getElementById('courseLevel').value || 'beginner',
      language: document.getElementById('courseLanguage').value || 'en',
      thumbnail_url: document.getElementById('thumbnailImg').src || null
    };
    
    // Validate required fields
    if (!courseData.title || !courseData.description || isNaN(courseData.price) || courseData.price < 0) {
      alert('Please fill in all required fields (Title, Description, Price)');
      return;
    }
    
    // Don't send status for new courses (server sets it to 'pending')
    // Only send status for updates if admin
    if (this.courseId) {
      courseData.status = status === 'published' ? 'pending' : 'draft';
    }
    
    const modules = this.collectModulesData();
    console.log('Saving course with modules:', modules);
    
    try {
      let savedCourse;
      
      // Save course to API
      if (this.courseId && this.api) {
        // Try to update existing course first
        try {
          console.log('Attempting to update course:', this.courseId);
          const updateResponse = await this.api.updateCourse(this.courseId, courseData);
          savedCourse = updateResponse.course;
          console.log('Course updated:', savedCourse);
        } catch (updateError) {
          // If update fails (course doesn't exist in DB), create new one
          console.log('Update failed, creating new course:', updateError);
          console.log('Creating new course in database...');
          const createResponse = await this.api.createCourse(courseData);
          savedCourse = createResponse.course;
          this.courseId = savedCourse.course_id;
          console.log('Course created:', savedCourse);
        }
      } else if (this.api) {
        // Create new course
        console.log('Creating new course');
        const createResponse = await this.api.createCourse(courseData);
        savedCourse = createResponse.course;
        this.courseId = savedCourse.course_id;
        console.log('Course created:', savedCourse);
      }
      
      // Save modules and lessons to API
      if (savedCourse && this.api && modules.length > 0) {
        console.log('Saving modules and lessons to API...');
        await this.saveModulesAndLessonsToAPI(savedCourse.course_id, modules);
      }
      
      // Also save to localStorage as backup
      const courseDataForStorage = {
        id: savedCourse?.course_id || this.courseId || Date.now(),
        course_id: savedCourse?.course_id || this.courseId || Date.now(),
        ...courseData,
        modules: modules,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
      
      const courses = JSON.parse(localStorage.getItem('instructor_courses') || '[]');
      const existingIndex = courses.findIndex(c => c.id == courseDataForStorage.id || c.course_id == courseDataForStorage.id);
      
      if (existingIndex !== -1) {
        courses[existingIndex] = courseDataForStorage;
      } else {
        courses.push(courseDataForStorage);
      }
      
      localStorage.setItem('instructor_courses', JSON.stringify(courses));
      
      alert(`Course ${status === 'published' ? 'submitted for review' : 'saved as draft'} successfully!`);
      
      if (status === 'published') {
        setTimeout(() => {
          window.location.href = 'code.html';
        }, 1000);
      }
    } catch (error) {
      console.error('Error saving course:', error);
      console.error('Error details:', error);
      const errorMessage = error.message || error.error || 'Unknown error';
      const errorDetails = error.details || '';
      alert(`Error saving course: ${errorMessage}${errorDetails ? '\n\nDetails: ' + errorDetails : ''}\n\nCheck browser console (F12) for more details.`);
    }
  }
  
  async saveModulesAndLessonsToAPI(courseId, modules) {
    if (!this.api) return;
    
    try {
      // Save each module and its lessons
      for (let moduleIndex = 0; moduleIndex < modules.length; moduleIndex++) {
        const module = modules[moduleIndex];
        
        // Save module
        let savedModule;
        if (module.module_id) {
          // Update existing module
          const moduleResponse = await this.api.updateModule(courseId, module.module_id, {
            title: module.title,
            order_index: module.orderIndex || moduleIndex
          });
          savedModule = moduleResponse.module;
        } else {
          // Create new module
          const moduleResponse = await this.api.createModule(courseId, {
            title: module.title,
            order_index: module.orderIndex || moduleIndex
          });
          savedModule = moduleResponse.module;
        }
        
        console.log(`Module ${moduleIndex + 1} saved:`, savedModule);
        
        // Save lessons for this module
        if (savedModule && module.lessons && module.lessons.length > 0) {
          for (let lessonIndex = 0; lessonIndex < module.lessons.length; lessonIndex++) {
            const lesson = module.lessons[lessonIndex];
            
            // Prepare content_data based on lesson type
            let contentData = {};
            if (lesson.type === 'video' && lesson.content?.youtubeUrl) {
              contentData = {
                youtubeUrl: lesson.content.youtubeUrl,
                videoId: lesson.content.videoId
              };
            } else if (lesson.type === 'text' && lesson.content?.content) {
              contentData = {
                content: lesson.content.content
              };
            } else if (lesson.content?.exerciseFiles || lesson.content?.documentFiles) {
              contentData = {
                exerciseFiles: lesson.content.exerciseFiles || [],
                documentFiles: lesson.content.documentFiles || []
              };
            }
            
            // Save lesson
            if (lesson.lesson_id) {
              // Update existing lesson
              await this.api.updateLesson(courseId, lesson.lesson_id, {
                module_id: savedModule.module_id,
                title: lesson.title,
                content_type: lesson.type,
                content_data: contentData,
                order_index: lesson.orderIndex || lessonIndex,
                is_preview: lesson.isPreview || false
              });
            } else {
              // Create new lesson
              await this.api.createLesson(courseId, {
                module_id: savedModule.module_id,
                title: lesson.title,
                content_type: lesson.type,
                content_data: contentData,
                order_index: lesson.orderIndex || lessonIndex,
                is_preview: lesson.isPreview || false
              });
            }
            
            console.log(`Lesson ${lessonIndex + 1} saved for module ${moduleIndex + 1}`);
          }
        }
      }
      
      console.log('All modules and lessons saved successfully');
    } catch (error) {
      console.error('Error saving modules/lessons:', error);
      throw error;
    }
  }

  collectModulesData() {
    const modules = [];
    const moduleItems = document.querySelectorAll('.module-item');
    
    moduleItems.forEach((moduleItem, moduleIndex) => {
      const moduleTitle = moduleItem.querySelector('.module-title').value;
      const lessons = [];
      
      const lessonItems = moduleItem.querySelectorAll('.lesson-item');
      lessonItems.forEach((lessonItem, lessonIndex) => {
        const lessonTitle = lessonItem.querySelector('.lesson-title').value;
        const lessonType = lessonItem.querySelector('.lesson-type').value;
        const isPreview = lessonItem.querySelector('.is-preview').checked;
        
        let content = {};
        if (lessonType === 'video') {
          const youtubeUrl = lessonItem.querySelector('.youtube-url').value;
          const videoId = this.extractYouTubeId(youtubeUrl);
          content = { type: 'video', youtubeUrl, videoId };
        } else if (lessonType === 'text') {
          const textContent = lessonItem.querySelector('.text-content-area').value;
          content = { type: 'text', content: textContent };
        } else {
          const exerciseFiles = Array.from(lessonItem.querySelector('.exercise-file').files).map(f => ({
            name: f.name,
            size: f.size,
            type: f.type
          }));
          const documentFiles = Array.from(lessonItem.querySelector('.document-file').files).map(f => ({
            name: f.name,
            size: f.size,
            type: f.type
          }));
          content = { type: lessonType, exerciseFiles, documentFiles };
        }
        
        lessons.push({
          id: Date.now() + lessonIndex,
          title: lessonTitle,
          type: lessonType,
          isPreview,
          orderIndex: lessonIndex,
          content
        });
      });
      
      modules.push({
        id: Date.now() + moduleIndex,
        title: moduleTitle,
        orderIndex: moduleIndex,
        lessons
      });
    });
    
    return modules;
  }

  async loadCourseData() {
    if (!this.courseId) {
      console.log('No course ID, creating new course');
      return;
    }
    
    console.log('Loading course data for ID:', this.courseId);
    
    // Try to load from API first
    if (this.api) {
      try {
        console.log('Attempting to load from API...');
        const response = await this.api.getCourse(this.courseId);
        console.log('API response:', response);
        
        if (response && response.course) {
          console.log('Course loaded from API:', response.course);
          this.loadCourseIntoEditor(response.course);
          return;
        }
      } catch (error) {
        console.warn('Failed to load course from API, trying localStorage:', error);
      }
    }
    
    // Fallback to localStorage
    console.log('Loading from localStorage...');
    const courses = JSON.parse(localStorage.getItem('instructor_courses') || '[]');
    console.log('All courses in localStorage:', courses);
    console.log('Looking for course with ID:', this.courseId);
    
    // Try multiple ID field names
    const course = courses.find(c => {
      const idMatch = c.id == this.courseId || 
                     c.course_id == this.courseId ||
                     String(c.id) === String(this.courseId) ||
                     String(c.course_id) === String(this.courseId);
      if (idMatch) {
        console.log('Found course:', c);
      }
      return idMatch;
    });
    
    if (!course) {
      console.warn('Course not found in localStorage:', this.courseId);
      console.log('Available course IDs:', courses.map(c => ({ id: c.id, course_id: c.course_id })));
      alert(`Course not found! ID: ${this.courseId}\nAvailable IDs: ${courses.map(c => c.id || c.course_id).join(', ')}`);
      return;
    }
    
    console.log('Course found in localStorage:', course);
    console.log('Course modules:', course.modules);
    this.loadCourseIntoEditor(course);
  }

  loadCourseIntoEditor(course) {
    console.log('=== Loading Course Into Editor ===');
    console.log('Full course object:', JSON.stringify(course, null, 2));
    
    // Load course info - handle both API and localStorage formats
    document.getElementById('courseTitle').value = course.title || '';
    document.getElementById('shortDescription').value = course.short_description || course.shortDescription || '';
    document.getElementById('courseDescription').value = course.description || '';
    document.getElementById('coursePrice').value = course.price || '';
    document.getElementById('courseCategory').value = course.category_id || course.category || '';
    document.getElementById('courseLevel').value = course.level || 'beginner';
    document.getElementById('courseLanguage').value = course.language || 'en';
    document.getElementById('isPublished').checked = course.status === 'published' || course.isPublished || false;
    document.getElementById('allowPreview').checked = course.allow_preview || course.allowPreview || false;
    
    if (course.thumbnail_url || course.thumbnail) {
      document.getElementById('thumbnailImg').src = course.thumbnail_url || course.thumbnail;
      document.getElementById('thumbnailPreview').classList.remove('hidden');
    }
    
    // Load modules - handle both API and localStorage formats
    let modules = course.modules || [];
    console.log('Modules found:', modules);
    console.log('Modules length:', modules.length);
    console.log('Is array?', Array.isArray(modules));
    
    if (modules && modules.length > 0) {
      console.log(`Loading ${modules.length} modules...`);
      modules.forEach((module, moduleIdx) => {
        console.log(`Loading module ${moduleIdx + 1}:`, module);
        this.addModule();
        const moduleItems = document.querySelectorAll('.module-item');
        const moduleItem = moduleItems[moduleItems.length - 1];
        const moduleTitleInput = moduleItem.querySelector('.module-title');
        if (moduleTitleInput) {
          moduleTitleInput.value = module.title || module.module_title || '';
          console.log(`Module title set: ${moduleTitleInput.value}`);
        }
        
        const lessons = module.lessons || [];
        console.log(`Module has ${lessons.length} lessons`);
        if (lessons.length > 0) {
          lessons.forEach((lesson, lessonIdx) => {
            console.log(`  Loading lesson ${lessonIdx + 1}:`, lesson);
            this.addLesson(moduleItem);
            const lessonItems = moduleItem.querySelectorAll('.lesson-item');
            const lessonItem = lessonItems[lessonItems.length - 1];
            
            // Set lesson title
            const lessonTitleInput = lessonItem.querySelector('.lesson-title');
            if (lessonTitleInput) {
              lessonTitleInput.value = lesson.title || lesson.lesson_title || '';
              console.log(`    Lesson title set: ${lessonTitleInput.value}`);
            }
            
            // Set lesson type
            const lessonType = lesson.content_type || lesson.type || 'video';
            console.log(`    Lesson type: ${lessonType}`);
            const lessonTypeSelect = lessonItem.querySelector('.lesson-type');
            if (lessonTypeSelect) {
              lessonTypeSelect.value = lessonType;
            }
            
            // Set preview checkbox
            const previewCheckbox = lessonItem.querySelector('.is-preview');
            if (previewCheckbox) {
              previewCheckbox.checked = lesson.is_preview || lesson.isPreview || false;
            }
            
            // Show correct content type section FIRST
            this.handleContentTypeChange(lessonItem, lessonType);
            
            // Load lesson content based on type - handle both API and localStorage formats
            // Use longer delay to ensure handleContentTypeChange has completed
            setTimeout(() => {
              console.log(`    Loading content for lesson ${lessonIdx + 1}, type: ${lessonType}`);
              console.log(`    Lesson data:`, lesson);
              
              // Handle API format (content_data JSON) and localStorage format
              let contentData = lesson.content_data;
              if (typeof contentData === 'string') {
                try {
                  contentData = JSON.parse(contentData);
                  console.log(`    Parsed content_data:`, contentData);
                } catch (e) {
                  console.error(`    Error parsing content_data:`, e);
                  contentData = {};
                }
              }
              
              if (lessonType === 'video') {
                const youtubeUrl = lesson.youtube_url || 
                                  lesson.content?.youtubeUrl || 
                                  contentData?.youtubeUrl || 
                                  contentData?.youtube_url || '';
                
                console.log(`    YouTube URL found:`, youtubeUrl);
                
                if (youtubeUrl) {
                  const urlInput = lessonItem.querySelector('.youtube-url');
                  if (urlInput) {
                    urlInput.value = youtubeUrl;
                    console.log(`    YouTube URL set in input:`, urlInput.value);
                    // Auto-preview if video ID exists
                    const videoId = lesson.video_id || 
                                   lesson.content?.videoId || 
                                   contentData?.videoId || 
                                   this.extractYouTubeId(youtubeUrl);
                    if (videoId) {
                      console.log(`    Auto-previewing video with ID:`, videoId);
                      setTimeout(() => this.previewYouTube(lessonItem), 200);
                    }
                  } else {
                    console.warn(`    YouTube URL input not found!`);
                  }
                } else {
                  console.warn(`    No YouTube URL found in lesson data`);
                }
              } else if (lessonType === 'text') {
                const textContent = lesson.text_content || 
                                  lesson.content?.content || 
                                  contentData?.content || 
                                  contentData?.text_content || '';
                
                console.log(`    Text content found:`, textContent ? `${textContent.substring(0, 50)}...` : 'none');
                
                if (textContent) {
                  const textArea = lessonItem.querySelector('.text-content-area');
                  if (textArea) {
                    textArea.value = textContent;
                    console.log(`    Text content set in textarea`);
                  } else {
                    console.warn(`    Text area not found!`);
                  }
                } else {
                  console.warn(`    No text content found in lesson data`);
                }
              } else if (lessonType === 'quiz' || lessonType === 'assignment') {
                // Restore file lists display
                const exerciseFiles = lesson.content?.exerciseFiles || 
                                     contentData?.exerciseFiles || 
                                     lesson.exerciseFiles || [];
                const documentFiles = lesson.content?.documentFiles || 
                                     contentData?.documentFiles || 
                                     lesson.documentFiles || [];
                
                console.log(`    Exercise files:`, exerciseFiles);
                console.log(`    Document files:`, documentFiles);
                
                // Display uploaded files in the UI
                this.restoreUploadedFiles(lessonItem, exerciseFiles, documentFiles);
              }
            }, 100 * lessonIdx); // Increased delay to ensure DOM is ready
          });
        }
      });
    } else {
      console.log('No modules found in course data');
      console.log('Course data keys:', Object.keys(course));
    }
    
    this.updateStats();
    console.log('Course loading complete. Stats updated.');
  }

  updateStats() {
    const moduleCount = document.querySelectorAll('.module-item').length;
    const lessonCount = document.querySelectorAll('.lesson-item').length;
    
    // Calculate total duration (simplified - assume 10 min per lesson)
    const totalDuration = lessonCount * 10;
    
    document.getElementById('modulesCount').textContent = moduleCount;
    document.getElementById('lessonsCount').textContent = lessonCount;
    document.getElementById('totalDuration').textContent = `${totalDuration} min`;
  }

  getCurrentUser() {
    return JSON.parse(localStorage.getItem('currentUser') || 'null');
  }
}

function handleLogout(e) {
  e.preventDefault();
  if (confirm('Are you sure you want to logout? Any unsaved changes will be lost.')) {
    if (window.api) {
      window.api.logout();
    }
    localStorage.removeItem('authToken');
    localStorage.removeItem('currentUser');
    window.location.href = '../../pages/auth/login.html';
  }
}

let courseEditor;
document.addEventListener('DOMContentLoaded', () => {
  courseEditor = new CourseEditor();
});
</script>
